<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Kiosk Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="aurora" data-transition="slide">
    <div class="background-orbs" aria-hidden="true">
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
    </div>

    <main id="app" class="app">
      <header class="top-bar glass">
        <div>
          <h1 id="displayTitle">Family Home Assistant Display</h1>
          <p id="displaySubtitle">Organized, informed, and a little bit silly</p>
        </div>
        <div class="clock-wrap">
          <div id="clockTime" class="clock-time">--:--</div>
          <div id="clockDate" class="clock-date">Loading...</div>
        </div>
      </header>

      <section class="scene-shell">
        <article id="sceneCard" class="scene-card glass transition-slide">
          <div class="scene-header">
            <h2 id="sceneTitle">Waiting for content...</h2>
            <p id="sceneSubtitle">Your assistant can control this display via MCP.</p>
          </div>
          <div id="sceneElements" class="scene-grid"></div>
        </article>
      </section>

      <footer class="ticker glass">
        <div class="ticker-label">Family Feed</div>
        <div class="ticker-marquee">
          <div id="tickerTrack" class="ticker-track"></div>
        </div>
      </footer>
    </main>

    <aside id="overlay" class="overlay" aria-live="polite" aria-atomic="true">
      <span id="overlayEmoji" class="overlay-emoji">✨</span>
      <span id="overlayText">Overlay message</span>
    </aside>

    <script type="module" src="./app.js"></script>
  </body>
</html>
